<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>passgen</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="/static/css/output.css" rel="stylesheet">
    <link href="/static/css/custom.css" rel="stylesheet">
</head>

<body class="h-screen flex justify-center items-center bg-zinc-800 text-white quicksand-font sm:text-xl text-sm">

    <nav class="text-white fixed top-0 left-0 w-full z-10 bg-zinc-900 shadow-md sm:text-xl text-xs">
        <div class="max-w-4xl mx-auto p-4 flex justify-center space-x-4 mt-2 mb-2">
            <a href="/"
                class="bg-indigo-600 hover:bg-indigo-500 text-white py-2 px-4 rounded-lg flex items-center space-x-2 fredoka-font">
                <i class="fa-solid fa-key"></i>
                <span>passgen</span>
            </a>
        </div>
    </nav>

    <div class="bg-zinc-900 p-8 rounded-lg shadow-lg sm:w-full max-w-md">

        <div id="result" class="mb-4 p-4 bg-zinc-700 rounded-md text-center text-white sm:text-2xl text-sm font-mono">
            wygenerowane hasło
        </div>

        <div class="mb-4">
            <label for="length" class="text-white font-bold block mb-2">długość hasła:</label>
            <div class="flex items-center space-x-4">
                <input type="number" id="length" value="12" min="4" max="24"
                    class="w-20 p-2 rounded-md bg-zinc-700 text-white border border-zinc-600 focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400">
                <input type="range" id="lengthRange" min="4" max="24" value="12" class="w-full accent-indigo-600">
            </div>
        </div>

        <script>
            const lengthInput = document.getElementById('length');
            const lengthRange = document.getElementById('lengthRange');

            lengthRange.addEventListener('input', () => {
                lengthInput.value = lengthRange.value;
            });

            lengthInput.addEventListener('input', () => {
                lengthRange.value = lengthInput.value;
            });
        </script>

        <fieldset class="mb-4">
            <legend class="text-sm font-medium text-indigo-400">uwzględnij:</legend>
            <label class="flex items-center mt-2">
                <input type="checkbox" id="lowercase" checked class="w-5 h-5 accent-indigo-600">
                <span class="ml-2">małe litery</span>
            </label>
            <label class="flex items-center mt-2">
                <input type="checkbox" id="uppercase" checked class="w-5 h-5 accent-indigo-600">
                <span class="ml-2">wielkie litery</span>
            </label>
            <label class="flex items-center mt-2">
                <input type="checkbox" id="numbers" checked class="w-5 h-5 accent-indigo-600">
                <span class="ml-2">cyfry</span>
            </label>
            <label class="flex items-center mt-2">
                <input type="checkbox" id="special" checked class="w-5 h-5 accent-indigo-600">
                <span class="ml-2">znaki specjalne</span>
            </label>
            <label class="flex items-center mt-2">
                <input type="checkbox" id="compatibility" checked class="w-5 h-5 accent-indigo-600">
                <span class="ml-2">tryb kompatybilności</span>
                <div class="relative group sm:flex items-center hidden">
                    <i
                        class="fa-regular fa-circle-question ml-2 font-small text-indigo-400 cursor-pointer opacity-70"></i>
                    <div
                        class="absolute bottom-full mb-2 left-1/2 transform -translate-x-1/2 p-2 w-50 sm:w-max text-sm text-white border-1 border-indigo-400 bg-zinc-800 rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-500">
                        <p class="text-indigo-400 font-bold">tryb kompatybilności obejmuje:</p>
                        <p><i class="fa-solid fa-check"></i> kompatybilność z systemem sap <i
                                class="fa-solid fa-arrow-right"></i> pierwszy znak nie może być znakiem <i
                                class="fa-solid fa-question"></i> oraz <i class="fa-solid fa-exclamation"></i> &nbsp <a
                                href="https://help.sap.com/doc/saphelp_nw75/7.5.5/en-US/4a/c3efb58c352470e10000000a42189c/content.htm?no_cache=true"
                                class="text-indigo-400"> info <i class="fa-solid fa-link"></i></i></a></p>
                        <p><i class="fa-solid fa-check"></i> kompatybilność z systemem sap <i
                                class="fa-solid fa-arrow-right"></i> pierwsze trzy znaki nie mogą być identyczne &nbsp
                            <a href="https://help.sap.com/doc/saphelp_nw75/7.5.5/en-US/4a/c3efb58c352470e10000000a42189c/content.htm?no_cache=true"
                                class="text-indigo-400"> info <i class="fa-solid fa-link"></i></i></a>
                        </p>
                    </div>
                </div>
            </label>
        </fieldset>

        <div class="flex space-x-4">
            <button id="generate"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded-lg">
                generuj
            </button>
            <button id="copy" class="bg-zinc-700 hover:bg-zinc-600 text-white font-bold py-2 px-4 rounded-lg">
                kopiuj
            </button>
        </div>

        <div id="info" class="flex justify-center text-red-500 text-sm mt-4 h-1"></div>

        <div id="errorPopup"
            class="fixed inset-0 flex items-center justify-center backdrop-blur-md bg-zinc/20 hidden z-30">
            <div
                class="bg-zinc-900 p-6 rounded-lg shadow-lg max-w-sm sm:w-full w-60 flex flex-col border border-zinc-700">
                <h2 class="text-xl font-bold text-red-400">Błąd!</h2>
                <p id="popupMessage" class="mt-2 text-gray-300"></p>

                <div class="flex-grow"></div>

                <button id="closePopup" class="mt-4 px-4 py-2 bg-red-500 hover:bg-red-400 text-white rounded-lg w-full">
                    zamknij
                </button>
            </div>
        </div>

    </div>

    <script src="/static/js/script.js"></script>

    <footer class="text-center text-white mt-8 p-4 w-full fixed bottom-0 bg-zinc-900 quicksand-font-700">
        <p class="sm:text-lg text-xs">&copy; 2026
            <a href="https://alanmyszka.pl" class="mr-12">alanmyszka.pl</a>
            <a href="https://github.com/alanmyszka" class="mr-2"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.linkedin.com/in/alanmyszka/"><i class="fa-brands fa-linkedin-in"></i></i></a>
        </p>
    </footer>

</body>

</html>
