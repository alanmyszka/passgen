<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>passgen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div class="card">
        <div class="title">passgen</div>
        <div class="sub">generator haseł</div>
        <div id="result">wygenerowane hasło</div>
        <div class="row">
            <input type="number" id="length" value="12" min="4" max="32">
            <input type="range" id="lengthRange" min="4" max="32" value="12">
        </div>
        <fieldset>
            <legend>uwzględnij</legend>
            <label><input type="checkbox" id="lowercase" checked> małe litery</label>
            <label><input type="checkbox" id="uppercase" checked> wielkie litery</label>
            <label><input type="checkbox" id="numbers" checked> cyfry</label>
            <label><input type="checkbox" id="special" checked> znaki specjalne</label>
            <label>
                <input type="checkbox" id="compatibility" checked> tryb kompatybilności
                <span class="tooltip" id="compatInfoTrigger">?
                    <div class="tooltip-box">
                        <b>tryb kompatybilności obejmuje:</b><br><br>
                        > kompatybilność z systemem SAP - pierwszy znak nie może być ! ani ? <br>
                        <a
                            href="https://help.sap.com/doc/saphelp_nw75/7.5.5/en-US/4a/c3efb58c352470e10000000a42189c/content.htm?no_cache=true">info</a>
                        <br><br>
                        > kompatybilność z systemem SAP - pierwsze trzy znaki nie mogą być identyczne <br>
                        <a
                            href="https://help.sap.com/doc/saphelp_nw75/7.5.5/en-US/4a/c3efb58c352470e10000000a42189c/content.htm?no_cache=true">info</a>
                    </div>
                </span>
            </label>
        </fieldset>
        <div class="buttons">
            <button id="generate">generuj</button>
            <button id="copy">kopiuj</button>
        </div>
        <div id="info"></div>
    </div>
    <div id="errorPopup" class="hidden">
        <div class="popup">
            <h2>Błąd</h2>
            <p id="popupMessage"></p>
            <button id="closePopup">zamknij</button>
        </div>
    </div>
    <div id="infoPopup" class="hidden">
        <div class="popup">
            <div id="compatContent"></div>
            <button id="closeInfoPopup">zamknij</button>
        </div>
    </div>  
    <script src="/script.js"></script>
</body>

</html>
